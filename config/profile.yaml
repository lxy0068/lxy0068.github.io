bio:
  en: |
    Hello! I am an enthusiast in algorithms and engineering, and I am about to join the
    [Huawei Intelligent Automotive Solution BU](https://auto.huawei.com/cn/) as an AI Engineer.
    I am dedicated to translating cutting-edge algorithmic research into robust and efficient
    practical systems, pursuing breakthroughs in both AI model innovation and full-stack
    engineering implementation.

    I completed my undergraduate studies at the
    [College of Future Technology, South China University of Technology](https://www2.scut.edu.cn/ft/rgznzy/list.htm),
    under the guidance of [Prof. Qi Liu](https://drliuqi.github.io/) and
    [Prof. Yahui Jia](https://www2.scut.edu.cn/ft/2021/1105/c45109a450065/page.htm),
    where I accumulated solid research training in intelligent optimization algorithms and systems.
    In engineering practice, I have led multiple AI projects end-to-end, covering the complete
    lifecycle from requirements analysis and problem definition, algorithm research and selection,
    and system architecture design, through model iteration and optimization, deployment
    integration, performance tuning, and cross-team collaboration.

    I believe that where you direct your energy, consistently and deliberately, determines
    how far you go. Knowledge and capability obey the logic of compounding, each cycle of
    learning, practice, and reflection accumulates on the last, and time is the most honest
    multiplier of all. I am passionate about breaking complex real-world challenges into
    executable modules, clarifying the path forward through systematic reasoning, and closing
    the loop through rigorous validation. I take pragmatism as my anchor and iterative
    evolution as my rhythm, holding enough conviction to keep moving and enough composure
    to recalibrate when the situation demands. I focus on sustained investment in the
    variables within my control, recognizing that action and outcome are separated by lag
    and noise, and so I place greater weight on the integrity of the process than on any
    single result. I respect the complexity and natural cadence of systems, and treat
    long-term accumulation as a more reliable signal than short-term outcomes. I grow
    through real-world practice, and pursue continuous refinement without fixating on
    any final destination.

    Feel free to contact me anytime to discuss any topic.

  zh: |
    你好！我是一名算法与工程实践爱好者，即将入职[华为智能汽车解决方案BU](https://auto.huawei.com/cn/)，
    担任AI工程师。我致力于将前沿算法研究转化为稳健高效的实用系统，
    在AI模型创新与全栈工程实现中追求突破。

    我本科就读于[华南理工大学未来技术学院](https://www2.scut.edu.cn/ft/rgznzy/list.htm)，曾在[刘琦教授](https://drliuqi.github.io/)与[贾亚晖教授](https://www2.scut.edu.cn/ft/2021/1105/c45109a450065/page.htm)
    的指导下，积累了智能优化算法与系统方向的科研训练。
    在工程实践上，我具备多次主导AI项目端到端交付的经验，
    完整覆盖从需求分析与问题定义、算法调研与选型、系统架构设计、模型迭代优化，
    到部署集成、性能调优及跨团队协作的全流程闭环。

    我相信，精力分配决定层次。
    认知与能力遵循复利逻辑，每一次学习、实践与反思，都在前一次的基础上叠加生长，时间是最诚实的杠杆。
    我热衷于将复杂的现实挑战拆解为可执行的模块，用系统性推理厘清路径，以严格验证驱动闭环。
    我以务实主义为锚点，以迭代进化为节奏，既保持足够的笃定去推进，也保持足够的从容去修正。
    我专注于可控变量的持续投入，理解行动与结果之间存在时滞与噪声，更在意过程的正确性。
    我尊重系统自身的复杂性与节律，将长期积累视为比单次结果更可靠的判断依据。
    我在社会实践中成长迭代，追求无终点的持续精进。

    欢迎随时联系我，讨论任何话题。

